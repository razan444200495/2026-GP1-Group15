{% extends "base.html" %}

{% block content %}
<section class="admin-section">
  <div class="container">
    
    <h1 style="margin-bottom:30px;">Edit Event</h1>

    <form class="edit-form" method="POST">

      <div class="form-grid">

        <div class="form-group">
          <label>Title</label>
          <input type="text" name="title" value="{{ event.title }}" required>
        </div>

        <div class="form-group">
          <label>Category</label>
          <input type="text" name="category" value="{{ event.category }}" required>
        </div>

        <div class="form-group">
          <label>City</label>
          <input type="text" name="city" value="{{ event.city }}" required>
        </div>

        <div class="form-group">
          <label>Start Date</label>
          <input type="date" name="start_date" value="{{ event.start_date }}">
        </div>

        <div class="form-group">
          <label>Time</label>
          <input type="text" name="time" value="{{ event.time }}">
        </div>

        <div class="form-group full">
          <label>Description</label>
          <textarea name="description">{{ event.description }}</textarea>
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" name="location" value="{{ event.location }}">
        </div>

        <div class="form-group">
          <label>Price</label>
          <input type="text" name="price" value="{{ event.price }}">
        </div>

        <div class="form-group">
          <label>Image URL</label>
          <input type="text" name="image" value="{{ event.image }}">
        </div>

        <div class="form-group">
          <label>Official Link</label>
          <input type="text" name="official_link" value="{{ event.official_link }}">
        </div>

        <div class="form-group">
          <label>End Date</label>
          <input type="date" name="end_date" value="{{ event.end_date }}">
        </div>

      </div>

      <div class="form-actions">
        <button type="submit" class="btn-delete">Update</button>
        <a href="{{ url_for('admin.admin_dashboard') }}" class="btn-edit">Cancel</a>
      </div>

    </form>

  </div>
</section>

<style>
.edit-form {
  background: var(--bg-card);
  padding: 30px;
  border-radius: 20px;
  box-shadow: var(--shadow);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group.full {
  grid-column: 1 / -1;
}

label {
  font-size: 0.9rem;
  margin-bottom: 6px;
  color: var(--text-soft);
}

input, textarea {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-size: 0.95rem;
}

textarea {
  min-height: 90px;
}

.form-actions {
  margin-top: 25px;
  display: flex;
  gap: 12px;
}
</style>

{% endblock %}
